<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details - HerStep</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Free shipping on orders over $100</span>
            <span>Contact: support@herstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="index.html" class="logo">HerStep</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li id="order-nav-item"><a href="#" id="order-nav-link">Order</a></li>
                <li id="dashboard-nav-item" style="display: none;"><a href="staff-dashboard.html">Dashboard</a></li>
                <li class="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <div style="max-width: 800px; margin: 0 auto;">
                <h1 style="margin-bottom: 2rem;">Order Details</h1>
                
                <div class="card">
                    <div class="card-body">
                        <div id="order-details-content">
                            <!-- Order details loaded dynamically -->
                        </div>
                        
                        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                            <a href="#" id="dynamic-order-btn" class="btn btn-secondary">Back to Orders</a>
                            <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About HerStep</h3>
                <p>Your destination for stylish and comfortable women's footwear.</p>
            </div>
            <div class="footer-section">
                <h3>Contact</h3>
                <ul>
                    <li>📧 support@herstep.com</li>
                    <li>📞 1-800-HERSTEP</li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        function loadOrderDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('orderId');
            
            if (!orderId) {
                document.getElementById('order-details-content').innerHTML = '<p>Order not found</p>';
                return;
            }
            
            const order = store.orders.find(o => String(o.id) === String(orderId) || String(o.orderNumber) === String(orderId));
            
            if (!order) {
                document.getElementById('order-details-content').innerHTML = '<p>Order not found</p>';
                return;
            }
            
            const user = store.users.find(u => u.id === order.userId);
            const container = document.getElementById('order-details-content');
            
            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--primary-color);">
                    <div>
                        <h2 style="margin-bottom: 0.25rem;">Order ${order.id}</h2>
                        <p style="color: var(--text-light);">Placed on ${new Date(order.createdAt).toLocaleString()}</p>
                    </div>
                    <div style="text-align: right;">
                        <span style="padding: 0.5rem 1rem; background: ${getStatusColor(order.status)}; color: white; border-radius: 20px; font-weight: bold;">
                            ${order.status.toUpperCase()}
                        </span>
                    </div>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
                    <div>
                        <h3 style="margin-bottom: 1rem;">Shipping Address</h3>
                        <p style="color: var(--text-light); line-height: 1.8;">
                            ${ (order.shippingAddress && (order.shippingAddress.fullName || order.shippingAddress.name)) || 'N/A'}<br>
                            ${ (order.shippingAddress && (order.shippingAddress.address || order.shippingAddress.addr)) || '' }<br>
                            ${ (order.shippingAddress && (order.shippingAddress.city || '')) }, ${ (order.shippingAddress && (order.shippingAddress.zipCode || order.shippingAddress.zip || '')) }
                        </p>
                    </div>
                    <div>
                        <h3 style="margin-bottom: 1rem;">Payment Information</h3>
                        <p style="color: var(--text-light); line-height: 1.8;">
                            <strong>Method:</strong> ${(order.paymentMethod || '').toUpperCase()}<br>
                            <strong>Customer:</strong> ${user ? user.firstName + ' ' + user.lastName : 'N/A'}<br>
                            <strong>Email:</strong> ${user ? user.email : (order.userEmail || 'N/A')}
                        </p>
                    </div>
                </div>
                
                <h3 style="margin-bottom: 1rem;">Order Items</h3>
                <div class="table" style="overflow-x: auto; margin-bottom: 2rem;">
                    <table style="min-width: 600px;">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Quantity</th>
                                <th>Unit Price</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${order.items.map(item => `
                                <tr>
                                    <td>
                                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                                            <span style="font-size: 1.5rem;">${item.image || ''}</span>
                                            <span>${(item.name || item.productName || 'Product #' + (item.productId||item.id))}</span>
                                        </div>
                                    </td>
                                    <td>${item.quantity}</td>
                                    <td>${formatCurrency(item.price || item.unitPrice || item.unit_price || 0)}</td>
                                    <td>${formatCurrency((item.price || item.unitPrice || item.unit_price || 0) * item.quantity)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                
                <div style="background: var(--light-gray); padding: 1.5rem; border-radius: 8px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span>Subtotal</span>
                        <span>${formatCurrency(order.items.reduce((sum, i) => sum + ((i.price || i.unitPrice || i.unit_price || 0) * (i.quantity || 0)), 0))}</span>
                    </div>
                    ${order.discount > 0 ? `
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: var(--success-color);">
                            <span>Discount</span>
                            <span>-${formatCurrency(order.discount)}</span>
                        </div>
                    ` : ''}
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span>Shipping</span>
                        <span>${order.total + order.discount >= 100 ? 'FREE' : '$9.99'}</span>
                    </div>
                    <hr style="margin: 1rem 0;">
                    <div style="display: flex; justify-content: space-between; font-size: 1.5rem; font-weight: bold; color: var(--primary-color);">
                        <span>Total Paid</span>
                        <span>${formatCurrency(order.total)}</span>
                    </div>
                </div>
                
                ${(store.currentUser && store.currentUser.role !== 'staff') ? `
                    <div style="margin-top: 2rem; padding: 1rem; background: var(--light-gray); border-radius: 8px;">
                        <h3 style="margin-bottom: 0.5rem;">Need Help?</h3>
                        <p style="color: var(--text-light); margin-bottom: 1rem;">
                            Have questions about your order? Contact our support team.
                        </p>
                        <div style="display: flex; gap: 1rem;">
                            <button class="btn btn-secondary" onclick="contactSupport()">Contact Support</button>
                            ${order.status === 'placed' ? `
                                <button class="btn btn-danger" onclick="cancelOrder()">Cancel Order</button>
                            ` : ''}
                            ${order.status === 'delivered' ? `
                                <button class="btn btn-secondary" onclick="requestReturn()">Return/Refund</button>
                            ` : ''}
                        </div>
                    </div>
                ` : ''}
            `;
        }
        function getStatusColor(status) {
            const colors = {
                'placed': 'var(--primary-color)',
                'processing': 'var(--warning-color)',
                'shipped': '#2196f3',
                'delivered': 'var(--success-color)',
                'cancelled': 'var(--error-color)'
            };
            return colors[status] || 'var(--text-light)';
        }
        
        function contactSupport() {
            const message = prompt('Enter your message to support:');
            if (message) {
                showNotification('Message sent to support!', 'success');
            }
        }
        
        async function cancelOrder() {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('orderId');
            
            if (confirm('Are you sure you want to cancel this order?')) {
                const ok = await orders.cancel(orderId);
                if (ok) {
                    showNotification('Order cancelled successfully', 'success');
                    setTimeout(() => {
                        window.location.href = 'orders.html';
                    }, 1000);
                } else {
                    showNotification('Failed to cancel order', 'error');
                }
            }
        }
        
        function requestReturn() {
            const reason = prompt('Please enter the reason for return:');
            if (reason) {
                showNotification('Return request submitted!', 'success');
            }
        }
        
        if (typeof orders !== 'undefined' && typeof orders.loadOrders === 'function') {
            orders.loadOrders().then(() => loadOrderDetails()).catch(() => loadOrderDetails());
        } else {
            loadOrderDetails();
        }
    </script>
</body>
</html>
