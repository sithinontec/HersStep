<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Staff Dashboard - HersStep</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Staff Dashboard</span>
            <span>Contact: support@hersstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="index.html" class="logo">HersStep</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li class="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Staff Dashboard</h1>
            <div class="card">
                <div class="card-body">
                    <p>Welcome to the staff area — use the links below to manage products and orders.</p>
                            <div style="display:flex; gap:1rem; margin-top:1rem;">
                                <a href="staff-products.html" class="btn btn-primary">Manage Products</a>
                                <a href="staff-reports.html" class="btn btn-secondary">Reports</a>
                            </div>
                </div>
            </div>

            <div id="staff-welcome" style="margin-top:1rem;"></div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About HersStep</h3>
                <p>Your destination for stylish and comfortable women's footwear.</p>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        // Simple staff-check: if not staff, redirect to login
        if (!store.currentUser || store.currentUser.role !== 'staff') {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
