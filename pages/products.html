<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - HersStep</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Free shipping on orders over $100</span>
            <span>Contact: support@hersstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="index.html" class="logo">HersStep</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li class="auth-links"></li>
                <li>
                    <a href="cart.html" class="cart-icon">
                        🛒
                        <span class="cart-count"></span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1 style="margin-bottom: 2rem;">All Products</h1>
            
            <!-- Filters -->
            <div class="filter-section">
                <div class="filter-grid">
                    <div class="form-group">
                        <label for="model-filter">Model</label>
                        <select id="model-filter" class="form-control">
                            <option value="">All Models</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="price-filter">Price Range</label>
                        <select id="price-filter" class="form-control">
                            <option value="">All Prices</option>
                            <option value="0-50">Under $50</option>
                            <option value="50-75">$50 - $75</option>
                            <option value="75-100">$75 - $100</option>
                            <option value="100+">$100+</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="sort-by">Sort By</label>
                        <select id="sort-by" class="form-control">
                            <option value="name">Name</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                            <option value="model">Model</option>
                            <option value="color">Color</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="search">Search</label>
                        <input type="text" id="search" class="form-control" placeholder="Search products...">
                    </div>
                </div>
            </div>
            
            <!-- Products Grid -->
            <div class="product-grid" id="products-container">
                <!-- Products loaded dynamically -->
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About HersStep</h3>
                <p>Your destination for stylish and comfortable women's footwear.</p>
            </div>
            <div class="footer-section">
                <h3>Quick Links</h3>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Shop</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h3>Contact</h3>
                <ul>
                    <li>📧 support@hersstep.com</li>
                    <li>📞 1-800-HERSTEP</li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        let filteredProducts = [...store.products];
        
        function renderProducts() {
            const container = document.getElementById('products-container');
            
            if (filteredProducts.length === 0) {
                container.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">No products found.</p>';
                return;
            }

            container.innerHTML = filteredProducts.map(product => `
                <div class="card">
                    <div class="card-img"><img src="${product.image}" alt="${product.name}" style="width:100%;height:100%;object-fit:cover;"></div>
                    <div class="card-body">
                        <h3 class="card-title">${product.name} <small style="color:#666;font-weight:400;">#${product.id}</small></h3>
                        <p class="card-text">${product.description}</p>
                        <div class="card-price">${formatCurrency(product.price)}</div>
                        <div style="margin-bottom: 1rem; color: var(--text-light);">Model: ${product.model} · Color: ${product.color} · (${product.stock} in stock)</div>
                        <button class="btn btn-primary" onclick="addToCart(${product.id})" ${product.stock === 0 ? 'disabled' : ''}>
                            ${product.stock === 0 ? 'Out of Stock' : 'Add to Cart'}
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function filterProducts() {
            const category = document.getElementById('model-filter').value;
            const priceRange = document.getElementById('price-filter').value;
            const sortBy = document.getElementById('sort-by').value;
            const searchTerm = document.getElementById('search').value.toLowerCase();
            
            filteredProducts = store.products.filter(product => {
                // Model filter
                if (category && product.model !== category) return false;
                
                // Price filter
                if (priceRange) {
                    const [min, max] = priceRange.split('-').map(v => v === '+' ? Infinity : parseFloat(v));
                    if (product.price < min || product.price > max) return false;
                }
                
                // Search filter
                if (searchTerm && !product.name.toLowerCase().includes(searchTerm) && 
                    !product.description.toLowerCase().includes(searchTerm)) {
                    return false;
                }
                
                return true;
            });
            
            // Sort
            switch(sortBy) {
                case 'name':
                    filteredProducts.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'price-low':
                    filteredProducts.sort((a, b) => a.price - b.price);
                    break;
                case 'price-high':
                    filteredProducts.sort((a, b) => b.price - a.price);
                    break;
                case 'model':
                    filteredProducts.sort((a, b) => (a.model || '').localeCompare(b.model || ''));
                    break;
                case 'color':
                    filteredProducts.sort((a, b) => (a.color || '').localeCompare(b.color || ''));
                    break;
            }
            
            renderProducts();
        }
        
        function addToCart(productId) {
            const product = products.getById(productId);
            if (product && product.stock > 0) {
                cart.add(product);
                showNotification('Added to cart!', 'success');
            }
        }
        
        // Event listeners
        document.getElementById('model-filter').addEventListener('change', filterProducts);
        document.getElementById('price-filter').addEventListener('change', filterProducts);
        document.getElementById('sort-by').addEventListener('change', filterProducts);
        document.getElementById('search').addEventListener('input', filterProducts);
        
        // Populate model filter from available products
        (function populateModelFilter(){
            const sel = document.getElementById('model-filter');
            if (!sel) return;
            const models = [...new Set(store.products.map(p => p.model))].sort();
            sel.innerHTML = '<option value="">All Models</option>' + models.map(m => `<option value="${m}">${m}</option>`).join('');
        })();

        // Initial render
        renderProducts();
    </script>
</body>
</html>
