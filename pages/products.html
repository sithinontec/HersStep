<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - HerStep</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Free shipping on orders over $100</span>
            <span>Contact: support@hersstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="index.html" class="logo">HerStep</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="about.html">About</a></li>
                <li class="auth-links"></li>
                <li>
                    <a href="cart.html" class="cart-icon">
                        🛒
                        <span class="cart-count"></span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1 style="margin-bottom: 2rem;">All Products</h1>

            <!-- Filters -->
            <div class="filter-section">
                <div class="filter-grid">
                    <div class="form-group">
                        <label for="model-filter">Model</label>
                        <select id="model-filter" class="form-control">
                            <option value="">All Models</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="price-filter">Price Range</label>
                        <select id="price-filter" class="form-control">
                            <option value="">All Prices</option>
                            <option value="0-50">Under $50</option>
                            <option value="50-75">$50 - $75</option>
                            <option value="75-100">$75 - $100</option>
                            <option value="100+">$100+</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="sort-by">Sort By</label>
                        <select id="sort-by" class="form-control">
                            <option value="name">Name</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                            <option value="model">Model</option>
                            <option value="color">Color</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="search">Search</label>
                        <input type="text" id="search" class="form-control" placeholder="Search products...">
                    </div>
                </div>
            </div>

            <!-- Products Grid -->
            <div class="product-grid" id="products-container">
                <!-- Products loaded dynamically -->
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About HerStep</h3>
                <p>Your destination for stylish and comfortable women's footwear.</p>
            </div>
            <div class="footer-section">
                <h3>Quick Links</h3>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Shop</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h3>Contact</h3>
                <ul>
                    <li>📧 support@hersstep.com</li>
                    <li>📞 1-800-HERSTEP</li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        // FIX 5: Define window.renderProducts BEFORE app.js runs so the async
        // fetch callback in loadProducts() can find and call it correctly.
        // This replaces the old version that wasn't on window and used the
        // wrong container ID (#product-grid vs #products-container).
        window.renderProducts = function() {
            applyFiltersAndRender();   // render with current filter state
            populateModelFilter();     // FIX 6: was defined but never called
        };

        // --- Filter & sort state ---
        function getFilteredProducts() {
            let items = [...window.store.products];

            // Search
            const searchVal = (document.getElementById('search')?.value || '').trim().toLowerCase();
            if (searchVal) {
                items = items.filter(p =>
                    p.name.toLowerCase().includes(searchVal) ||
                    (p.description || '').toLowerCase().includes(searchVal) ||
                    (p.model || '').toLowerCase().includes(searchVal)
                );
            }

            // Model filter
            const modelVal = document.getElementById('model-filter')?.value || '';
            if (modelVal) {
                items = items.filter(p => p.model === modelVal);
            }

            // Price filter
            const priceVal = document.getElementById('price-filter')?.value || '';
            if (priceVal) {
                if (priceVal === '100+') {
                    items = items.filter(p => Number(p.price) >= 100);
                } else {
                    const [min, max] = priceVal.split('-').map(Number);
                    items = items.filter(p => Number(p.price) >= min && Number(p.price) < max);
                }
            }

            // Sort
            const sortVal = document.getElementById('sort-by')?.value || 'name';
            if (sortVal === 'price-low')  items.sort((a, b) => a.price - b.price);
            if (sortVal === 'price-high') items.sort((a, b) => b.price - a.price);
            if (sortVal === 'name')       items.sort((a, b) => a.name.localeCompare(b.name));
            if (sortVal === 'model')      items.sort((a, b) => (a.model || '').localeCompare(b.model || ''));
            if (sortVal === 'color')      items.sort((a, b) => (a.color || '').localeCompare(b.color || ''));

            return items;
        }

        function applyFiltersAndRender() {
            const container = document.getElementById('products-container');
            if (!container) return;

            const items = getFilteredProducts();

            if (items.length === 0) {
                container.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-light);">No products found.</p>';
                return;
            }

            container.innerHTML = items.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <p>${window.formatCurrency(product.price)}</p>
                    <button onclick="addToCart(${product.id})">Add to Cart</button>
                </div>
            `).join('');
        }

        // FIX 6: Actually call this — it was defined but never invoked before
        function populateModelFilter() {
            const sel = document.getElementById('model-filter');
            if (!sel || !window.store.products.length) return;
            const models = [...new Set(window.store.products.map(p => p.model).filter(Boolean))].sort();
            sel.innerHTML = '<option value="">All Models</option>' +
                models.map(m => `<option value="${m}">${m}</option>`).join('');
        }

        function addToCart(productId) {
            const product = window.store.products.find(p => p.id === productId);
            if (product) {
                if (product.stock > 0) {
                    window.cart.add(product);
                    window.showNotification(`Added ${product.name} to cart!`, 'success');
                } else {
                    window.showNotification('Sorry, this item is out of stock.', 'error');
                }
            } else {
                console.error('Product not found in store:', productId);
            }
        }

        // Wire up filter/search controls so they re-render on any change
        ['model-filter', 'price-filter', 'sort-by'].forEach(id => {
            document.getElementById(id)?.addEventListener('change', applyFiltersAndRender);
        });
        document.getElementById('search')?.addEventListener('input', applyFiltersAndRender);
    </script>
</body>
</html>
