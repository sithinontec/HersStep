<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - HersStep</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Free shipping on orders over $100</span>
            <span>Contact: support@hersstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="index.html" class="logo">HersStep</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li class="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1 style="margin-bottom: 2rem;">My Profile</h1>
            
            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <div class="card-body">
                    <form id="profile-form">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="age">Age</label>
                            <input type="number" id="age" class="form-control" min="13" max="120" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" class="form-control">
                        </div>
                        
                        <div id="message" style="margin-top: 1rem;"></div>
                        
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="orders.html" class="btn btn-secondary" style="margin-left: 0.5rem;">View Orders</a>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About HersStep</h3>
                <p>Your destination for stylish and comfortable women's footwear.</p>
            </div>
            <div class="footer-section">
                <h3>Contact</h3>
                <ul>
                    <li>📧 support@hersstep.com</li>
                    <li>📞 1-800-HERSTEP</li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        function loadProfile() {
            if (!store.currentUser) {
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('firstName').value = store.currentUser.firstName;
            document.getElementById('lastName').value = store.currentUser.lastName;
            document.getElementById('age').value = store.currentUser.age;
            document.getElementById('email').value = store.currentUser.email;
            document.getElementById('phone').value = store.currentUser.phone || '';
        }
        
        document.getElementById('profile-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const updates = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                age: parseInt(document.getElementById('age').value),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim()
            };

            const messageEl = document.getElementById('message');
            try {
                const ok = await auth.updateProfile(updates);
                if (ok) {
                    messageEl.innerHTML = '<span style="color: var(--success-color);">Profile updated successfully!</span>';
                    showNotification('Profile updated!', 'success');
                } else {
                    messageEl.innerHTML = '<span class="error-message">Failed to update profile</span>';
                }
            } catch (e) {
                messageEl.innerHTML = '<span class="error-message">' + (e.message || 'Failed to update profile') + '</span>';
            }
        });
        
        loadProfile();
    </script>
</body>
</html>
