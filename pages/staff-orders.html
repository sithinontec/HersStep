<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Orders - HersStep (Staff)</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Staff Area</span>
            <span>Contact: support@hersstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="index.html" class="logo">HersStep</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li class="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>All Orders</h1>
            <div class="card">
                <div class="card-body">
                    <div id="orders-list">Loading orders...</div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About HersStep</h3>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        if (!store.currentUser || store.currentUser.role !== 'staff') {
            window.location.href = 'login.html';
        }

        const list = document.getElementById('orders-list');

        function renderOrders() {
            if (!list) return;
            const arr = (store.orders || []).slice().sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
            if (arr.length === 0) {
                list.textContent = 'No orders yet.';
                return;
            }

            list.innerHTML = arr.map(o => `
                <div style="border-bottom:1px solid #eee; padding:0.5rem 0;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div><strong>${o.id}</strong> — ${new Date(o.createdAt).toLocaleString()}</div>
                        <div>
                            <select onchange="changeOrderStatus('${o.id}', this.value)">
                                <option value="placed" ${o.status==='placed' ? 'selected' : ''}>Placed</option>
                                <option value="processing" ${o.status==='processing' ? 'selected' : ''}>Processing</option>
                                <option value="shipped" ${o.status==='shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="delivered" ${o.status==='delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="cancelled" ${o.status==='cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </div>
                    </div>
                    <div style="margin-top:0.5rem;">Items: ${o.items.map(i => i.name + ' x' + i.quantity).join(', ')}</div>
                    <div>Total: ${formatCurrency(o.total)}</div>
                    <div style="margin-top:0.5rem; display:flex; gap:0.5rem;">
                        <a class="btn btn-secondary" href="order-details.html?orderId=${o.id}">View</a>
                        ${o.status !== 'cancelled' ? `<button class="btn btn-danger" onclick="cancelOrder('${o.id}')">Cancel</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        window.changeOrderStatus = function(orderId, status) {
            if (!orderId) return;
            if (status === 'cancelled') {
                if (!confirm('Cancel this order? This will restore stock.')) {
                    renderOrders();
                    return;
                }
                const ok = orders.cancel(orderId);
                if (ok) showNotification('Order cancelled', 'success');
                else showNotification('Failed to cancel order', 'error');
            } else {
                if (!confirm('Change order status to "' + status + '"?')) {
                    renderOrders();
                    return;
                }
                const ok = orders.updateStatus(orderId, status);
                if (ok) showNotification('Order status updated', 'success');
                else showNotification('Failed to update status', 'error');
            }
            renderOrders();
        };

        window.cancelOrder = function(orderId) {
            if (!orderId) return;
            if (!confirm('Are you sure you want to cancel this order?')) return;
            const ok = orders.cancel(orderId);
            if (ok) {
                showNotification('Order cancelled', 'success');
                renderOrders();
            } else {
                showNotification('Failed to cancel order', 'error');
            }
        };

        // Initial render
        renderOrders();
    </script>
</body>
</html>
