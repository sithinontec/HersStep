<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Reports - HersStep (Staff)</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Staff Area</span>
            <span>Contact: support@hersstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="index.html" class="logo">HersStep</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li class="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Sales Reports</h1>
            <div class="card">
                <div class="card-body">
                    <p>Simple sales summary (read-only).</p>
                    <div id="report-summary"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About HersStep</h3>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        if (!store.currentUser || store.currentUser.role !== 'staff') {
            window.location.href = 'login.html';
        }

        const el = document.getElementById('report-summary');
        function renderReport() {
            const totalSales = (store.orders || []).reduce((s, o) => s + (o.total || 0), 0);
            const count = (store.orders || []).length;
            el.innerHTML = `<div>Total orders: ${count}</div><div>Total sales: ${formatCurrency(totalSales)}</div>`;
        }

        if (typeof orders !== 'undefined' && typeof orders.loadOrders === 'function') {
            orders.loadOrders().then(() => renderReport()).catch(() => renderReport());
        } else {
            renderReport();
        }
    </script>
</body>
</html>
