<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Manage Products - HerStep (Staff)</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <div class="top-bar">
            <span>Staff Area</span>
            <span>Contact: support@herstep.com</span>
        </div>
        <nav class="nav-container">
            <a href="index.html" class="logo">HerStep</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li id="order-nav-item" style="display: none;"><a href="#" id="order-nav-link">Order</a></li>
                <li id="dashboard-nav-item" style="display: none;"><a href="staff-dashboard.html">Dashboard</a></li>
                <li class="auth-links"></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="container">
            <h1>Products Management</h1>
            <div class="card" style="margin-bottom:1rem;">
                <div class="card-body">
                    <h2 style="margin-bottom:0.5rem;">Add New Product</h2>
                    <div id="add-product-error" class="error-message" style="display:none;margin-bottom:0.5rem;"></div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:0.5rem;">
                        <input id="new-name" class="form-control" placeholder="Product name">
                        <input id="new-model" class="form-control" placeholder="Model">
                        <input id="new-price" class="form-control" placeholder="Price" type="number" step="0.01">
                        <input id="new-stock" class="form-control" placeholder="Stock" type="number">
                        <input id="new-color" class="form-control" placeholder="Color">
                        <input id="new-image" class="form-control" placeholder="Image URL (http...)">
                    </div>
                    <div style="margin-top:0.5rem; display:flex; gap:0.5rem;">
                        <input id="new-description" class="form-control" placeholder="Short description" style="flex:1;">
                        <button id="add-product-btn" class="btn btn-primary">Add Product</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <h2 style="margin-bottom:0.5rem;">Existing Products</h2>
                    
                    <!-- Filter and Sort Controls -->
                    <div style="display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap; align-items:center;">
                        <input id="filter-search" class="form-control" placeholder="Search products..." style="min-width:200px;">
                        <select id="filter-model" class="form-control" style="min-width:150px;">
                            <option value="">All Models</option>
                        </select>
                        <select id="sort-by" class="form-control" style="min-width:150px;">
                            <option value="name">Sort by Name</option>
                            <option value="price-asc">Price: Low to High</option>
                            <option value="price-desc">Price: High to Low</option>
                            <option value="stock-asc">Stock: Low to High</option>
                            <option value="stock-desc">Stock: High to Low</option>
                            <option value="model">Sort by Model</option>
                            <option value="color">Sort by Color</option>
                        </select>
                        <button id="save-all-btn" class="btn btn-success" style="display:none;">💾 Save All Changes</button>
                    </div>

                    <div id="products-list"></div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About HerStep</h3>
            </div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script>
        if (!store.currentUser || store.currentUser.role !== 'staff') {
            window.location.href = 'login.html';
        }

        const listEl = document.getElementById('products-list');
        const addBtn = document.getElementById('add-product-btn');
        const addError = document.getElementById('add-product-error');
        const filterSearch = document.getElementById('filter-search');
        const filterModel = document.getElementById('filter-model');
        const sortBy = document.getElementById('sort-by');
        const saveAllBtn = document.getElementById('save-all-btn');

        let editedProducts = new Set();
        let newProducts = new Set();
        let currentEditId = null; // only one product may be edited at a time

        // Populate model filter
        function populateCategories() {
            const models = [...new Set(store.products.map(p => p.model))].sort();
            filterModel.innerHTML = '<option value="">All Models</option>' + 
                models.map(m => `<option value="${m}">${m}</option>`).join('');
        }

        // Filter and sort products
        function getFilteredProducts() {
            let filtered = [...store.products];

            // Search filter
            const searchTerm = filterSearch.value.toLowerCase().trim();
            if (searchTerm) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) ||
                    (p.model && p.model.toLowerCase().includes(searchTerm)) ||
                    (p.color && p.color.toLowerCase().includes(searchTerm)) ||
                    (p.description && p.description.toLowerCase().includes(searchTerm))
                );
            }

            // Model filter
            const selectedModel = filterModel.value;
            if (selectedModel) {
                filtered = filtered.filter(p => p.model === selectedModel);
            }

            // Sorting
            const sortValue = sortBy.value;
            filtered.sort((a, b) => {
                switch(sortValue) {
                    case 'name':
                        return a.name.localeCompare(b.name);
                    case 'price-asc':
                        return a.price - b.price;
                    case 'price-desc':
                        return b.price - a.price;
                    case 'stock-desc':
                        return b.stock - a.stock;
                    case 'model':
                        return (a.model || '').localeCompare(b.model || '');
                    case 'color':
                        return (a.color || '').localeCompare(b.color || '');
                    default:
                        return 0;
                }
            });

            return filtered;
        }

        function renderProducts() {
            // Closing any open inline editor when re-rendering
            currentEditId = null;
            if (!listEl) return;
            const filtered = getFilteredProducts();
            
            if (filtered.length === 0) {
                listEl.innerHTML = '<div style="padding:1rem;text-align:center;color:#666;">No products found.</div>';
                return;
            }

            listEl.innerHTML = filtered.map(p => `
                <div class="product-row" data-id="${p.id}" style="display:flex;align-items:center;justify-content:space-between;padding:0.5rem;border-bottom:1px solid #eee;${editedProducts.has(p.id) ? 'background-color:#fff3cd;' : ''}">
                    <div style="flex:1; display:flex; align-items:center; gap:0.75rem;">
                        <img src="${p.image || 'https://via.placeholder.com/64'}" alt="${p.name}" style="width:64px;height:64px;object-fit:cover;border-radius:6px;">
                        <div>
                            <strong>${p.name}</strong>
                            <div style="font-size:0.9rem;color:#666">${p.model} · ${p.color} · ${p.description || ''}</div>
                        </div>
                    </div>
                    <div style="width:140px;text-align:right">${formatCurrency(p.price)}</div>
                    <div style="width:180px;text-align:center; display:flex; align-items:center; justify-content:center; gap:0.25rem;">
                        <button class="btn btn-sm" onclick="adjustStock(${p.id}, -1)">−</button>
                        <input type="number" min="0" value="${p.stock}" 
                            onchange="updateStockDirect(${p.id}, this.value)" 
                            onclick="this.select()"
                            style="width:60px;text-align:center;font-weight:bold;font-size:1.1rem;border:1px solid #ddd;border-radius:4px;padding:0.25rem;">
                        <button class="btn btn-sm" onclick="adjustStock(${p.id}, +1)">+</button>
                    </div>
                    <div style="width:220px;text-align:right; display:flex; gap:0.25rem; justify-content:flex-end;">
                        <button class="btn btn-sm" onclick="startEditProduct(${p.id})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        window.adjustStock = function(id, delta) {
            const p = products.getById(id);
            if (!p) return;
            
            const oldStock = p.stock;
            const newStock = Math.max(0, oldStock + delta);
            if (newStock !== oldStock) {
                try {
                    products.localUpdate(id, { stock: newStock });
                    editedProducts.add(id);
                    updateSaveButton();
                    renderProducts();
                    showNotification(`Stock updated: ${p.name} (${oldStock} → ${newStock})`, 'success');
                } catch (e) {
                    showNotification(e.message || 'Failed to update stock', 'error');
                }
            }
        };

        window.updateStockDirect = function(id, newStockValue) {
            const p = products.getById(id);
            if (!p) return;
            
            const newStock = Math.max(0, parseInt(newStockValue, 10) || 0);
            if (newStock !== p.stock) {
                try {
                    products.localUpdate(id, { stock: newStock });
                    editedProducts.add(id);
                    updateSaveButton();
                    showNotification(`Stock updated: ${p.name} (${p.stock} → ${newStock})`, 'success');
                    renderProducts();
                } catch (e) {
                    showNotification(e.message || 'Failed to update stock', 'error');
                }
            }
        };

        function markAsEdited(id) {
            // If an id is provided, add that specific product id to the set.
            // For deletes, callers should add a `del:${id}` entry so it remains
            // trackable even though the product row may be removed.
            if (id !== undefined && id !== null) {
                editedProducts.add(id);
            }
            updateSaveButton();
        }

        function updateSaveButton() {
            // Normalize editedProducts entries so deletions like 'del:123' count
            const normalized = new Set();
            editedProducts.forEach(v => {
                const s = String(v);
                if (s.startsWith('del:')) normalized.add(s.slice(4));
                else normalized.add(s);
            });
            const count = normalized.size;
            saveAllBtn.style.display = count > 0 ? 'inline-block' : 'none';
            saveAllBtn.textContent = `💾 Save All Changes (${count})`;
        }

        function clearAddForm() {
            document.getElementById('new-name').value = '';
            document.getElementById('new-model').value = '';
            document.getElementById('new-price').value = '';
            document.getElementById('new-stock').value = '';
            document.getElementById('new-description').value = '';
            document.getElementById('new-image').value = '';
            document.getElementById('new-color').value = '';
            addError.style.display = 'none';
            addError.textContent = '';
        }

        // Filter event listeners
        filterSearch.addEventListener('input', renderProducts);
        filterModel.addEventListener('change', renderProducts);
        sortBy.addEventListener('change', renderProducts);

        // Save all button
        saveAllBtn.addEventListener('click', async function() {
            try {
                const res = await fetch((window.API_BASE || '') + '/api/products', {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(store.products || [])
                });
                if (!res.ok) throw new Error('Server save failed');
                editedProducts.clear();
                newProducts.clear();
                updateSaveButton();
                showNotification('All changes saved to database!', 'success');
                populateCategories();
                renderProducts();
            } catch (e) {
                // fallback to local storage
                products.saveProducts();
                editedProducts.clear();
                updateSaveButton();
                showNotification('Server save failed — changes saved locally', 'warning');
                populateCategories();
                renderProducts();
            }
        });

        // Auto-save to localStorage on add/delete (optional - can be removed if you prefer manual save only)
        // For now, we keep manual save but track all changes

        addBtn.addEventListener('click', async function() {
            // Clamp and parse inputs
            const rawPrice = parseFloat(document.getElementById('new-price').value);
            const priceVal = isNaN(rawPrice) ? 0 : Math.max(0, Math.round(rawPrice * 100) / 100);
            const rawStock = parseInt(document.getElementById('new-stock').value, 10);
            const stockVal = isNaN(rawStock) ? 0 : Math.max(0, rawStock);

            const productData = {
                name: document.getElementById('new-name').value.trim(),
                model: document.getElementById('new-model').value.trim(),
                color: document.getElementById('new-color').value.trim(),
                price: priceVal,
                stock: stockVal,
                description: document.getElementById('new-description').value.trim(),
                image: document.getElementById('new-image').value.trim() || 'https://via.placeholder.com/300x200?text=Product'
            };

            const errors = products.validate(productData);
            if (errors.length > 0) {
                addError.style.display = 'block';
                addError.textContent = errors.join('; ');
                return;
            }

            try {
                const prod = products.localAdd(productData);
                // Track the new product id as an edited item and as a new product
                editedProducts.add(prod.id);
                newProducts.add(prod.id);
                updateSaveButton();
                updateSaveButton();
                showNotification('Product added - don\'t forget to save all changes!', 'success');
                clearAddForm();
                populateCategories(); // Refresh models in case new model was added
                renderProducts();
            } catch (e) {
                addError.style.display = 'block';
                addError.textContent = e.message || 'Failed to add product';
            }
        });

        window.startEditProduct = function(id) {
            // If another product is being edited, close it first.
            if (currentEditId && currentEditId !== id) {
                renderProducts();
            }
            const row = document.querySelector(`.product-row[data-id="${id}"]`);
            const p = products.getById(id);
            if (!row || !p) return;

            currentEditId = id;

            row.innerHTML = `
                <div style="flex:1; display:grid; grid-template-columns: 120px 1fr; gap:0.25rem; align-items:center;">
                    <div style="font-weight:600; color:#333; padding-right:0.5rem;">Name</div><input id="edit-name-${id}" class="form-control" value="${p.name}">
                    <div style="font-weight:600; color:#333; padding-right:0.5rem;">Model</div><input id="edit-model-${id}" class="form-control" value="${p.model}">
                    <div style="font-weight:600; color:#333; padding-right:0.5rem;">Color</div><input id="edit-color-${id}" class="form-control" value="${p.color}">
                    <div style="font-weight:600; color:#333; padding-right:0.5rem;">Details</div><input id="edit-description-${id}" class="form-control" value="${p.description}">
                </div>
                <div style="width:200px;text-align:right; display:grid; gap:0.25rem;">
                    <div style="font-weight:600; color:#333;">Price</div><input id="edit-price-${id}" class="form-control" value="${p.price}" type="number" step="0.01">
                    <div style="font-weight:600; color:#333;">Stock</div><input id="edit-stock-${id}" class="form-control" value="${p.stock}" type="number">
                </div>
                <div style="width:220px;text-align:right; display:flex; gap:0.25rem; justify-content:flex-end; align-items:center;">
                    <button class="btn btn-success" onclick="saveEditProduct(${id})">Save</button>
                    <button class="btn btn-secondary" onclick="renderProducts()">Cancel</button>
                </div>
            `;
        };

        window.saveEditProduct = async function(id) {
            const rawPrice2 = parseFloat(document.getElementById(`edit-price-${id}`).value);
            const priceVal2 = isNaN(rawPrice2) ? 0 : Math.max(0, Math.round(rawPrice2 * 100) / 100);
            const rawStock2 = parseInt(document.getElementById(`edit-stock-${id}`).value, 10);
            const stockVal2 = isNaN(rawStock2) ? 0 : Math.max(0, rawStock2);

            const updates = {
                name: document.getElementById(`edit-name-${id}`).value.trim(),
                model: document.getElementById(`edit-model-${id}`).value.trim(),
                color: document.getElementById(`edit-color-${id}`).value.trim(),
                description: document.getElementById(`edit-description-${id}`).value.trim(),
                price: priceVal2,
                stock: stockVal2
            };

            const errors = products.validate(updates, id);
            if (errors.length > 0) {
                showNotification(errors.join('; '), 'error');
                return;
            }

            try {
                products.localUpdate(id, updates);
                editedProducts.add(id);
                updateSaveButton();
                showNotification('Product updated - don\'t forget to save all changes!', 'success');
                // Close the inline editor after saving and re-render
                currentEditId = null;
                renderProducts();
            } catch (e) {
                showNotification(e.message || 'Failed to update product', 'error');
            }
        };

        // Track when products are loaded to ensure save button shows for any changes

        window.deleteProduct = async function(id) {
            if (!confirm('Delete this product?')) return;
                try {
                    const ok = products.localRemove(id);
                    if (ok) {
                        // If this product was newly added and not yet saved, removing it
                        // should clear the staged add rather than mark a deletion.
                        if (newProducts.has(String(id)) || newProducts.has(Number(id))) {
                            newProducts.delete(id);
                            editedProducts.delete(id);
                            updateSaveButton();
                            showNotification('New product removed (unsaved)', 'info');
                        } else {
                            // Mark the deletion so Save All knows to persist it
                            editedProducts.add('del:' + id);
                            updateSaveButton();
                            showNotification('Product deleted - don\'t forget to save all changes!', 'info');
                        }
                        populateCategories(); // Refresh models in case last product of model was deleted
                        renderProducts();
                    } else {
                        showNotification('Failed to delete product', 'error');
                    }
                } catch (e) {
                    showNotification(e.message || 'Failed to delete product', 'error');
                }
        };

        // Initial render
        populateCategories();
        renderProducts();
    </script>
</body>
</html>
